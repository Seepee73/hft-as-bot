symbol: "BTC/USD"
exchange: "kraken"
exchange_ws_url: "wss://ws.kraken.com/v2"

# AS Model
gamma: 0.1
session_hours: 6.5

# Parameter estimation
vol_ewma_alpha: 0.05
kappa_window_secs: 60

# OMS
tick_size: 0.10
quote_qty: 1
refresh_interval_ms: 100

# Trading mode
paper_trading: true        # set to false when you have real Kraken API credentials
max_spread_ticks: 50       # cap quoted half-spread at 50 ticks = $5 each side for BTC

# Risk
max_inventory: 10
max_daily_loss_usd: 50000.0   # generous for paper trading; tighten for live

# Monitoring
prometheus_port: 8001
log_level: "INFO"
